services:
  - type: web
    name: fms-analytics-api
    env: python
    region: oregon
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
